name: WASM-vs-TS Parity

# ADR-0004 statistical-parity gate (Fork B go/no-go). The harness is skipped in
# the normal `bun run test` suite (it needs a *node-target* WASM build); this
# workflow builds that package and runs the parity + per-skill suites explicitly.
#
# Runs on PRs that touch the engine or the WASM seam, on pushes to main, and on
# manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "src/lib/uma-sim-wasm/**"
      - "src/modules/simulation/**"
      - ".github/workflows/parity.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "src/lib/uma-sim-wasm/**"
      - "src/modules/simulation/**"
      - ".github/workflows/parity.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: Statistical parity (node-target WASM)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust toolchain (wasm32)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build node-target WASM package
        run: |
          wasm-pack build packages/uma-sim-wasm \
            --target nodejs \
            --out-dir "$GITHUB_WORKSPACE/.tmp-wasm-node/pkg" \
            --out-name uma_sim_wasm

      - name: Parity — planner / compare bashin-delta
        env:
          UMA_WASM_NODE_PKG: ${{ github.workspace }}/.tmp-wasm-node/pkg/uma_sim_wasm.js
        run: bunx vitest run src/lib/uma-sim-wasm/parity.test.ts -t planner

      - name: Parity — 9-runner finish-rank
        env:
          UMA_WASM_NODE_PKG: ${{ github.workspace }}/.tmp-wasm-node/pkg/uma_sim_wasm.js
        run: bunx vitest run src/lib/uma-sim-wasm/parity.test.ts -t 9-runner

      - name: Parity — per-skill activation / effect
        env:
          UMA_WASM_NODE_PKG: ${{ github.workspace }}/.tmp-wasm-node/pkg/uma_sim_wasm.js
        run: bunx vitest run src/lib/uma-sim-wasm/parity.test.ts -t "effect parity"

      - name: Parity — dual condition-parser consistency
        env:
          UMA_WASM_NODE_PKG: ${{ github.workspace }}/.tmp-wasm-node/pkg/uma_sim_wasm.js
        run: bunx vitest run src/lib/uma-sim-wasm/parity.test.ts -t consistency
