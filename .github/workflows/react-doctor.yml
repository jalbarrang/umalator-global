name: React Doctor

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0 # required for `diff`

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run React Doctor
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run codeql:react-doctor -- . --yes --verbose --annotations --diff origin/${{ github.base_ref }}
          else
            bun run codeql:react-doctor -- . --yes --verbose --annotations --diff ${{ github.event.before }}
          fi
