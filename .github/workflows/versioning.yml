name: Versioning

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Disable husky git hooks in CI: semantic-release's automated release commit
    # must not run local dev-only gates (knip/dupes/typecheck) that can fail the commit.
    env:
      HUSKY: '0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.DATA_UPDATE_PAT }}
          GITHUB_TOKEN: ${{ secrets.DATA_UPDATE_PAT }}
        run: bunx semantic-release
