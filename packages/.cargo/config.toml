# =============================================================================
# Cargo Configuration — uma-sim (Rust workspace)
# Convenience aliases for the quality-gate commands.
# =============================================================================

[alias]
# Lint with zero-warning policy (mirrors CI).
lint = "clippy --workspace --all-targets -- -D warnings"
lint-fix = "clippy --workspace --all-targets --fix --allow-dirty -- -D warnings"
# Fast type-check across all targets.
qa = "check --workspace --all-targets"
# Build the WASM crate for the browser target.
wasm = "build -p uma-sim-wasm --target wasm32-unknown-unknown --release"
